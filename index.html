<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AoE2 Team Balancer</title>
    <meta name="description" content="Balance Age of Empires II team games. Fetch live ELO ratings, auto-assign civs and positions strategically." />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f5f3ee;
        color: #1a1a18;
        min-height: 100vh;
        padding: 0 1rem;
      }
      /* CSS variables to match the component's design system */
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f1efe8;
        --color-background-tertiary: #f5f3ee;
        --color-background-info: #e6f1fb;
        --color-background-danger: #fcebeb;
        --color-background-warning: #faeeda;
        --color-background-success: #eaf3de;
        --color-text-primary: #1a1a18;
        --color-text-secondary: #5f5e5a;
        --color-text-tertiary: #888780;
        --color-text-info: #185fa5;
        --color-text-danger: #a32d2d;
        --color-text-warning: #854f0b;
        --color-text-success: #3b6d11;
        --color-border-tertiary: rgba(26,26,24,0.15);
        --color-border-secondary: rgba(26,26,24,0.3);
        --color-border-primary: rgba(26,26,24,0.4);
        --color-border-info: #85b7eb;
        --color-border-danger: #f09595;
        --color-border-warning: #ef9f27;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
        --border-radius-xl: 16px;
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-background-primary: #1e1e1c;
          --color-background-secondary: #2c2c2a;
          --color-background-tertiary: #242422;
          --color-background-info: #042c53;
          --color-background-danger: #501313;
          --color-background-warning: #412402;
          --color-background-success: #173404;
          --color-text-primary: #f0ede6;
          --color-text-secondary: #b4b2a9;
          --color-text-tertiary: #888780;
          --color-text-info: #85b7eb;
          --color-text-danger: #f09595;
          --color-text-warning: #ef9f27;
          --color-text-success: #97c459;
          --color-border-tertiary: rgba(240,237,230,0.15);
          --color-border-secondary: rgba(240,237,230,0.3);
          --color-border-primary: rgba(240,237,230,0.4);
        }
        body { background: #242422; color: #f0ede6; }
      }
      input, button, select {
        font-family: inherit;
        outline: none;
      }
      input:focus {
        box-shadow: 0 0 0 2px var(--color-border-info);
        border-color: var(--color-border-info) !important;
      }
      button:hover { opacity: 0.85; }
      button:active { transform: scale(0.98); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
